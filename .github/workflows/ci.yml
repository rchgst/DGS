name: Integración Continua (CI)

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  validate-code:
    name: Validar Código (Lint y Build)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Instalar Dependencias
        run: pnpm install --frozen-lockfile

      - name: Verificar Estilo y Formato (Linter)
        run: pnpm lint

      - name: Verificar Compilación (Build & TypeScript)
        run: pnpm build

  validate-docker:
    name: Validar Dockerfile
    runs-on: ubuntu-latest
    needs: validate-code

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar Construcción de Imagen Docker (Dry-Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
