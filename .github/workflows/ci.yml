name: Integración Continua (CI)

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  # Trabajo 1: Calidad del Código (Linting, TypeScript y Construcción)
  validate-code:
    name: Validar Código (Lint y Build)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9  # Especifica la versión de pnpm compatible con tu proyecto

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm' # Cachea automáticamente las dependencias para que el CI corra ultra rápido

      - name: Instalar Dependencias
        run: pnpm install --frozen-lockfile

      - name: Verificar Estilo y Formato (Linter)
        run: pnpm lint

      - name: Verificar Compilación (Build & TypeScript)
        run: pnpm build

  # Trabajo 2: Verificación de Docker (Asegura que el contenedor compila correctamente)
  validate-docker:
    name: Validar Dockerfile
    runs-on: ubuntu-latest
    needs: validate-code # Solo corre si la validación de código fue exitosa

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar Construcción de Imagen Docker (Dry-Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Solo compila, no sube la imagen en la etapa de CI
          cache-from: type=gha # Utiliza caché de GitHub Actions para acelerar las builds
          cache-to: type=gha,mode=max
