version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: algoblocks-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: algoblocks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - algoblocks-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: algoblocks-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@algoblocks.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - algoblocks-net

volumes:
  postgres_data:

networks:
  algoblocks-net:
    driver: bridge
